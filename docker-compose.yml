name: mythosaur-tools

services:
  mythosaur-tools:
    build:
      context: ./services/mcp_server
    container_name: mythosaur-tools
    env_file:
      - .env
    environment:
      MYTHOSAUR_TOOLS_API_KEY: ${MYTHOSAUR_TOOLS_API_KEY}
      MYTHOSAUR_TOOLS_PROFILE: ${MYTHOSAUR_TOOLS_PROFILE:-readonly}
      MYTHOSAUR_TOOLS_WORKSPACE_ROOT: ${MYTHOSAUR_TOOLS_WORKSPACE_ROOT:-/workspace}
      MYTHOSAUR_TOOLS_SEARXNG_URL: ${MYTHOSAUR_TOOLS_SEARXNG_URL:-http://searxng-cache:8080}
      MYTHOSAUR_TOOLS_SEARXNG_TOKEN: ${MYTHOSAUR_TOOLS_SEARXNG_TOKEN:-}
      MYTHOSAUR_TOOLS_BROWSER_ENABLED: ${MYTHOSAUR_TOOLS_BROWSER_ENABLED:-false}
      MYTHOSAUR_TOOLS_BROWSER_HEADLESS: ${MYTHOSAUR_TOOLS_BROWSER_HEADLESS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      searxng-cache:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MYTHOSAUR_TOOLS_MCP_PORT:-8064}:8080"
    volumes:
      - ${MYTHOSAUR_TOOLS_WORKSPACE_HOST:-../mythosaur-ai}:${MYTHOSAUR_TOOLS_WORKSPACE_ROOT:-/workspace}
    restart: unless-stopped

  searxng:
    image: searxng/searxng:2026.2.28-a2108ce2e
    container_name: mythosaur-tools-searxng
    environment:
      BASE_URL: http://searxng-cache:8080
      UWSGI_WORKERS: 2
      UWSGI_THREADS: 2
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header='X-Real-IP: 127.0.0.1' --header='X-Forwarded-For: 127.0.0.1' --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped

  searxng-cache:
    image: nginx:1.27-alpine
    container_name: mythosaur-tools-searxng-cache
    depends_on:
      searxng:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MYTHOSAUR_TOOLS_SEARXNG_PORT:-8063}:8080"
    volumes:
      - ./searxng/cache-nginx.conf:/etc/nginx/nginx.conf:ro
      - mythosaur_tools_searxng_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mythosaur_tools_searxng_cache:
