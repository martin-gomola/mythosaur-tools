name: mythosaur-tools

services:
  mythosaur-tools:
    build:
      context: ./services/mcp_server
    container_name: mythosaur-tools
    env_file:
      - .env
    environment:
      MT_API_KEY: ${MT_API_KEY}
      MT_PROFILE: ${MT_PROFILE:-readonly}
      MT_WORKSPACE_ROOT: ${MT_WORKSPACE_ROOT:-/workspace}
      MT_SEARXNG_URL: ${MT_SEARXNG_URL:-http://searxng-cache:8080}
      MT_SEARXNG_TOKEN: ${MT_SEARXNG_TOKEN:-}
      MT_BROWSER_ENABLED: ${MT_BROWSER_ENABLED:-false}
      MT_BROWSER_HEADLESS: ${MT_BROWSER_HEADLESS:-true}
      MT_GOOGLE_CREDENTIALS_FILE: ${MT_GOOGLE_CREDENTIALS_FILE:-/secrets/google-credentials.json}
      MT_GOOGLE_TOKEN_FILE: ${MT_GOOGLE_TOKEN_FILE:-/secrets/google-token.json}
      MT_GOOGLE_MAPS_API_KEY: ${MT_GOOGLE_MAPS_API_KEY:-}
      MT_GOOGLE_MAPS_PLATFORM: ${MT_GOOGLE_MAPS_PLATFORM:-}
      MT_NOTEBOOKLM_BIN: ${MT_NOTEBOOKLM_BIN:-nlm}
      MT_NOTEBOOKLM_PROFILE: ${MT_NOTEBOOKLM_PROFILE:-default}
      MT_NOTEBOOKLM_TIMEOUT: ${MT_NOTEBOOKLM_TIMEOUT:-120}
      MT_NOTEBOOKLM_MCP_CLI_PATH: ${MT_NOTEBOOKLM_MCP_CLI_PATH:-/secrets/notebooklm}
      MT_LOG_LEVEL: ${MT_LOG_LEVEL:-INFO}
    depends_on:
      searxng-cache:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MT_MCP_PORT:-8064}:8080"
    volumes:
      - ${MT_WORKSPACE_HOST:-../mythosaur-ai}:${MT_WORKSPACE_ROOT:-/workspace}
      - ./secrets:/secrets
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: mythosaur-tools-searxng
    environment:
      BASE_URL: http://searxng-cache:8080
      UWSGI_WORKERS: 2
      UWSGI_THREADS: 2
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header='X-Real-IP: 127.0.0.1' --header='X-Forwarded-For: 127.0.0.1' --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped

  searxng-cache:
    image: nginx:1.27-alpine
    container_name: mythosaur-tools-searxng-cache
    depends_on:
      searxng:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MT_SEARXNG_PORT:-8063}:8080"
    volumes:
      - ./searxng/cache-nginx.conf:/etc/nginx/nginx.conf:ro
      - mythosaur_tools_searxng_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mythosaur_tools_searxng_cache:
