worker_processes auto;

events {
  worker_connections 1024;
}

http {
  proxy_cache_path /var/cache/nginx/searxng levels=1:2 keys_zone=searx_query_cache:20m inactive=30m max_size=512m;

  map $arg_q $is_time_sensitive_query {
    default 0;
    ~*(^|[+[:space:]])(today|latest|breaking|news|now|price|stock|weather|score|scores|schedule)([+[:space:]]|$) 1;
  }

  map "$request_method:$arg_format:$is_time_sensitive_query" $skip_search_cache {
    default 1;
    "GET:json:0" 0;
    "HEAD:json:0" 0;
  }

  upstream searxng_upstream {
    server searxng:8080;
    keepalive 16;
  }

  server {
    listen 8080;
    server_name _;

    location /search {
      proxy_pass http://searxng_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;

      proxy_cache searx_query_cache;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_methods GET HEAD;
      proxy_cache_lock on;
      proxy_cache_lock_timeout 5s;
      proxy_cache_background_update on;
      proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
      proxy_cache_valid 200 120s;
      proxy_cache_valid 301 302 1m;
      proxy_cache_valid any 0;

      proxy_ignore_headers Set-Cookie;
      proxy_hide_header Set-Cookie;
      proxy_cache_bypass $skip_search_cache;
      proxy_no_cache $skip_search_cache;

      add_header X-Cache-Status $upstream_cache_status always;
      add_header Cache-Control "public, max-age=120" always;
    }

    location / {
      proxy_pass http://searxng_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      add_header X-Cache-Status "BYPASS" always;
    }
  }
}
